name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxi-dev

      - name: Build workspace
        run: cargo build --workspace

      - name: Check workspace with all features (Linux)
        if: runner.os == 'Linux'
        run: cargo check --workspace --all-features

      - name: Run tests
        run: cargo test --workspace

      - name: Run headless renderer golden tests (Linux)
        if: runner.os == 'Linux'
        run: cargo test -p lv-renderer --features headless --test full_render_cycle

      - name: Clippy (zero warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Build with MIDI enabled (Linux only — requires libasound2-dev)
        if: runner.os == 'Linux'
        run: cargo build --workspace -F lv-app/midi

      - name: Check formatting
        run: cargo fmt --all -- --check

  wasm-check:
    name: WASM scaffold build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm32-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm32-cargo-

      - name: Build lv-data for wasm32 (no-default-features + wasm)
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --no-default-features
          --features wasm
          -p lv-data

      - name: Build as-pipeline for wasm32 (no-default-features + wasm)
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --no-default-features
          --features wasm
          -p as-pipeline

      - name: Build mf-pipeline for wasm32 (no-default-features + wasm)
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --no-default-features
          --features wasm
          -p mf-pipeline

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
          key: security-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: security-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
