<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucid Visualization Suite — WASM Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; }
    #app { display: flex; height: 100vh; }
    #sidebar { width: 340px; padding: 16px; background: #16213e; overflow-y: auto; }
    #sidebar h1 { font-size: 1.2rem; margin-bottom: 12px; color: #a8d8ea; }
    textarea { width: 100%; height: 200px; background: #0f3460; color: #e0e0e0;
               border: 1px solid #a8d8ea; border-radius: 4px; padding: 8px;
               font-family: monospace; font-size: 13px; resize: vertical; }
    button { margin-top: 10px; padding: 8px 20px; background: #e94560;
             color: #fff; border: none; border-radius: 4px; cursor: pointer;
             font-size: 14px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #ff6b6b; }
    #status { margin-top: 10px; font-size: 12px; color: #a8d8ea; min-height: 20px; }
    #info { margin-top: 10px; font-size: 12px; color: #888; }
    #viewport { flex: 1; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>LVS WASM Demo</h1>
    <label for="corpus">Paste a text corpus:</label>
    <textarea id="corpus" placeholder="Networks connect individuals and ideas in complex relationships. Data analysis reveals patterns hidden within large collections of information..."></textarea>
    <button id="run" disabled>Run Pipeline</button>
    <div id="status">Loading WASM module...</div>
    <div id="info"></div>
  </div>
  <div id="viewport">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script type="module">
  // Three.js loaded from CDN (ES module)
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';
  import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/controls/OrbitControls.js';

  const statusEl = document.getElementById('status');
  const infoEl = document.getElementById('info');
  const runBtn = document.getElementById('run');
  const corpusEl = document.getElementById('corpus');
  const canvas = document.getElementById('canvas');

  // --- Three.js setup ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, 1, 1, 5000);
  camera.position.set(0, 0, 800);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // Lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(200, 300, 400);
  scene.add(dirLight);

  let labelSprites = [];

  function resize() {
    const vp = document.getElementById('viewport');
    const w = vp.clientWidth;
    const h = vp.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', resize);
  resize();

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // --- Clear scene helpers ---
  function clearScene() {
    while (scene.children.length > 2) { // keep ambient + directional
      scene.remove(scene.children[scene.children.length - 1]);
    }
    labelSprites = [];
  }

  function makeLabel(text) {
    const cnv = document.createElement('canvas');
    cnv.width = 256; cnv.height = 64;
    const ctx = cnv.getContext('2d');
    ctx.fillStyle = '#e0e0e0';
    ctx.font = '24px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);
    const texture = new THREE.CanvasTexture(cnv);
    const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(60, 15, 1);
    return sprite;
  }

  // --- Render coordinates ---
  function renderCoordinates(data) {
    clearScene();
    const coords = data.coordinates;
    const geo = new THREE.SphereGeometry(6, 16, 16);

    for (const pt of coords) {
      const hue = (Math.abs(pt.x * 0.5 + pt.y * 0.3 + pt.z * 0.2) % 360) / 360;
      const color = new THREE.Color().setHSL(hue, 0.7, 0.6);
      const mat = new THREE.MeshPhongMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(pt.x, pt.y, pt.z);
      scene.add(mesh);

      const label = makeLabel(pt.label);
      label.position.set(pt.x, pt.y + 12, pt.z);
      scene.add(label);
    }

    infoEl.textContent = `${data.node_count} nodes | stress: ${data.stress.toFixed(4)} | algo: ${data.algorithm}`;
  }

  // --- WASM loading ---
  let wasmModule = null;

  async function loadWasm() {
    try {
      // Expects wasm-pack output in pkg/ next to www/
      const init = (await import('../pkg/lv_wasm.js')).default;
      wasmModule = await init();
      statusEl.textContent = 'Ready. Paste text and click Run.';
      runBtn.disabled = false;
    } catch (e) {
      statusEl.textContent = `WASM load failed: ${e.message}. Build with: wasm-pack build --target web crates/lv-wasm`;
    }
  }

  runBtn.addEventListener('click', () => {
    const text = corpusEl.value.trim();
    if (!text) { statusEl.textContent = 'Enter some text first.'; return; }
    statusEl.textContent = 'Running MF + AS pipeline...';
    runBtn.disabled = true;

    // Use setTimeout to let the UI update before blocking
    setTimeout(() => {
      try {
        const resultJson = wasmModule.run_mf_to_coordinates(text, '{}');
        const result = JSON.parse(resultJson);
        renderCoordinates(result);
        statusEl.textContent = 'Done!';
      } catch (e) {
        statusEl.textContent = `Error: ${e.message || e}`;
      }
      runBtn.disabled = false;
    }, 50);
  });

  loadWasm();
</script>
</body>
</html>
